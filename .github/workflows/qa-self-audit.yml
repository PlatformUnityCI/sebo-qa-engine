name: QA Self Audit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  qa-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install ruff bandit pip-audit

      - name: Ruff
        run: ruff check .

      - name: Bandit (fail on medium/high)
        run: |
          bandit -r src -f json -o bandit.json || true
          cat bandit.json
          if grep -E '"issue_severity": "(MEDIUM|HIGH)"' bandit.json; then
            echo "❌ Medium/High vulnerabilities found"
            exit 1
          fi
          
      - name: pip-audit
        run: pip-audit

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/default